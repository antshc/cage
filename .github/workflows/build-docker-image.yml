name: Docker Image CI

on:
  push:
    branches: [ "main", "dev", "release/v*" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      no_cache:
        description: Build without using Docker cache
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: antshc/cage
        tags: |
          type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=match,pattern=release/(v.*),group=1
          type=sha

    - name: Build and push (cached)
      uses: docker/build-push-action@v6
      if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.no_cache == true) }}
      with:
        context: ./src
        file: src/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push (no cache)
      uses: docker/build-push-action@v6
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.no_cache == true }}
      with:
        context: ./src
        file: src/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        no-cache: true