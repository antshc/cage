# docker-compose.allowed-repos.yml — overlay for workspace/github access tests.
# Tests that GitHub is fully accessible from the sandbox (all repos, gh CLI auth).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.allowed-repos.yml run --rm sandbox

services:
  sandbox:
    command: ["bash", "/home/ubuntu/workspace/test.sh"]
    volumes: !override
      - ./testing/github/mitmproxy/logs:/var/log/mitmproxy
      - ./testing/github/copilot:/var/log/copilot
      - ./workspace/github:/home/ubuntu/workspace
      - /home/pet/.config/gh:/home/ubuntu/.config/gh:ro
