services:
  sandbox:
    build:
      context: ./src
      dockerfile: Dockerfile
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.conf.all.route_localnet: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      - COPILOT_MODEL=${COPILOT_MODEL:-claude-sonnet-4.6}
      # Optional: override inference effort (e.g. low, medium, high)
      # - COPILOT_EFFORT=${COPILOT_EFFORT}
      # Optional: cap the autopilot continuation loop (default: 20)
      # - COPILOT_MAX_AUTOPILOT_CONTINUES=${COPILOT_MAX_AUTOPILOT_CONTINUES:-20}
      # Optional: comma-separated directories the agent can access (default: workspace,worktrees,.copilot)
      # - COPILOT_ADD_DIRS=${COPILOT_ADD_DIRS}
      # Optional: comma-separated deny-tool entries (unset = default git deny list; empty = no deny tools)
      # - COPILOT_DENY_TOOLS=${COPILOT_DENY_TOOLS}
      # GitHub CLI (gh) auth: either mount ~/.config/gh (preferred) or set GH_TOKEN.
      # Mount: uncomment the volume below. Token: uncomment GH_TOKEN (defaults to COPILOT_GITHUB_TOKEN if unset).
      # - GH_TOKEN=${GH_TOKEN}
      # Optional: forward localhost ports to host.docker.internal (e.g. DynamoDB, Redis, Postgres)
      # Comma-separated ports and/or dash ranges: "8000", "8000,5432", "9200-9300"
      # - HOST_DOCKER_DNAT_PORTS=${HOST_DOCKER_DNAT_PORTS}
    volumes: []
      # Mount mitmproxy logs, copilot logs, and user firewall rules (see docker-compose.<scenario>.yml overlays):
      # - ./testing/hello/mitmproxy/logs:/var/log/mitmproxy
      # - ./testing/hello/copilot:/var/log/copilot
      # - ./testing/hello/mitmproxy/rules:/etc/mitmproxy/user-rules:ro
      # Mount a folder of CA certificates (.crt/.pem) to trust private registries:
      # - ./certs:/etc/sandbox/certs:ro
      # Mount your workspace:
      # - ./workspace/hello:/home/ubuntu/workspace
      # Optional: mount a setup script to run at startup (as ubuntu, after proxy is ready)
      # - ./setup.sh:/etc/sandbox/setup.sh:ro
      # Optional: mount host git config for correct git identity inside the container
      # - ~/.gitconfig:/home/ubuntu/.gitconfig:ro
      # Optional: expose the host Docker socket so integration tests can manage containers.
      # WARNING: This grants full Docker daemon access (equivalent to root on the host).
      # Only enable for trusted developer workloads — never in production or untrusted CI.
      # - /var/run/docker.sock:/var/run/docker.sock
      # Required for GitHub CLI (gh) authentication — mount host gh config to enable GitHub access inside the container
      # - /home/dev/.config/gh:/home/dev/.config/gh:ro
