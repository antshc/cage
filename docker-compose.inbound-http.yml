# docker-compose.inbound-http.yml — overlay for workspace/inbound-http.
# Runs a minimal ASP.NET Core server inside the sandbox on port 2002.
# Port 2002 is published so an external caller container can reach it via
# host.docker.internal:2002 (or localhost:2002 on the host).
#
# Usage (see TESTING.md for full steps):
#   docker compose -f docker-compose.yml -f docker-compose.inbound-http.yml up -d
#   docker run --rm --add-host host.docker.internal:host-gateway curlimages/curl:latest \
#     curl --fail --retry 30 --retry-delay 1 --retry-connrefused \
#     http://host.docker.internal:2002/
#   docker compose -f docker-compose.yml -f docker-compose.inbound-http.yml \
#     wait sandbox

services:
  sandbox:
    command: ["dotnet", "run", "--project", "/home/ubuntu/workspace"]
    ports:
      - "2002:2002"
    volumes: !override
      - ./testing/inbound-http/mitmproxy/logs:/var/log/mitmproxy
      - ./testing/inbound-http/copilot:/var/log/copilot
      - ./workspace/inbound-http:/home/ubuntu/workspace
