# docker-compose.hub.yml — use the published Docker Hub image instead of building locally.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.hub.yml run --rm sandbox cop "Say Hi!"
#
# Or set COMPOSE_FILE in your shell to apply automatically:
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.hub.yml

services:
  sandbox:
    build: !reset null
    image: khdevnet/sandbox:${SANDBOX_TAG:-latest}
